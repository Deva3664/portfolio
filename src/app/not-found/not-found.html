<section class="not-found">
  <div class="content">
    <p class="error-code">{{ glitchText }}</p>
    <h1 class="title">Page Not Found</h1>
    <p class="message">
      Looks like you wandered into the void.<br>
      This page doesn't exist.
    </p>
    <div class="actions">
      <a routerLink="/" class="home-btn">← Back to Home</a>
    </div>
    <div class="terminal">
      <p><span class="prompt">$</span> cd /home</p>
      <p><span class="prompt">$</span> ls pages/</p>
      <p class="output">about projects skills blog resume contact</p>
      <p><span class="prompt">$</span> <span class="cursor">|</span></p>
    </div>
  </div>
</section>
