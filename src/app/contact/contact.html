<section class="contact">
  <div class="section-header">
    <h2>Get In <span>Touch</span></h2>
    <p>Have a project in mind? Let's talk.</p>
  </div>

  <div class="contact-container">
    <div class="contact-info">
      <div class="info-item">
        <span class="info-label">Email</span>
        <span class="info-value">devansh@email.com</span>
      </div>
      <div class="info-item">
        <span class="info-label">Location</span>
        <span class="info-value">Kanpur, India</span>
      </div>
      <div class="info-item">
        <span class="info-label">Availability</span>
        <span class="info-value">Open to opportunities</span>
      </div>
    </div>

    <div class="contact-form">
      @if (submitted) {
        <div class="success-msg">
          ✅ Message sent! I'll get back to you soon.
        </div>
      }

      @if (!submitted) {
        <div class="form-group">
          <label>Name</label>
          <input
            pInputText
            type="text"
            [(ngModel)]="formData.name"
            name="name"
            placeholder="Your name"
          />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input
            pInputText
            type="email"
            [(ngModel)]="formData.email"
            name="email"
            placeholder="your@email.com"
          />
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea
            pTextarea
            [(ngModel)]="formData.message"
            name="message"
            rows="5"
            placeholder="Tell me about your project..."
          ></textarea>
        </div>
        <p-button
          label="Send Message"
          icon="pi pi-send"
          (onClick)="onSubmit()"
          [style]="{'background': 'transparent', 'border': '1px solid #00ff9c', 'color': '#00ff9c', 'font-family': 'Courier New', 'letter-spacing': '2px'}"
        />
      }
    </div>
  </div>
</section>
